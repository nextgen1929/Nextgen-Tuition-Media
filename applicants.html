<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications | Nextgen Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ---------------- Reset & Variables ---------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { 
            --primary-blue: #6366F1;
            --primary-green: #059669; 
            --primary-red: #DC2626;
            --primary-orange: #D97706;
            --dark: #0F172A; 
            --gray: #64748B; 
            --border: #E2E8F0;
            --bg-main: #F4F7FE; 
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }
        body { background: var(--bg-main); color: #334155; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* ---------------- Sidebar (Empty as requested) ---------------- */
        .sidebar {
            width: 250px; background: #ffffff; height: 100vh; position: fixed; padding: 30px 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.02); z-index: 100;
        }
        .sidebar-logo {
            font-size: 1.6rem; font-weight: 700; color: var(--primary-blue);
            display: flex; align-items: center; gap: 12px; padding: 0 10px 30px;
            border-bottom: 1px dashed var(--border); text-decoration: none; margin-bottom: 20px;
        }
        .logout-wrap { position: absolute; bottom: 30px; width: calc(100% - 40px); }
        .logout-btn {
            display: flex; align-items: center; gap: 15px; padding: 14px 20px;
            color: var(--gray); text-decoration: none; font-weight: 500; border-radius: 12px;
            transition: 0.3s; cursor: pointer;
        }
        .logout-btn:hover { background: #FEF2F2; color: #EF4444; }

        /* ---------------- Main Content ---------------- */
        .main-content { margin-left: 250px; padding: 30px 40px; width: calc(100% - 250px); }

        /* ---------------- Top Bar ---------------- */
        .top-bar {
            background: #ffffff; border-radius: 16px; padding: 20px 30px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-soft); margin-bottom: 40px;
        }
        .top-bar h2 { font-size: 1.4rem; font-weight: 600; color: var(--dark); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-profile span { font-weight: 600; font-size: 0.95rem; }
        .avatar { width: 45px; height: 45px; background: #EEF2FF; color: var(--primary-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }

        /* ---------------- Header Section ---------------- */
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 2rem; font-weight: 700; color: var(--dark); margin-bottom: 5px; }
        .page-header p { color: var(--gray); font-size: 0.95rem; }

        /* ---------------- Summary Cards Grid ---------------- */
        .stats-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: #fff; padding: 25px 20px; border-radius: 16px; box-shadow: var(--shadow-soft);
            text-align: center; border: 1px solid var(--border);
        }
        .stat-card h3 { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .stat-card p { font-size: 0.85rem; color: var(--gray); font-weight: 500; }
        
        .c-active { color: var(--primary-blue); }
        .c-backup { color: var(--primary-orange); }
        .c-confirmed { color: var(--primary-green); }
        .c-rejected { color: var(--primary-red); }
        .c-all { color: var(--dark); }

        /* ---------------- Applications Section ---------------- */
        .apps-container { background: #fff; border-radius: 20px; padding: 30px; box-shadow: var(--shadow-soft); border: 1px solid var(--border); }
        
        .apps-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .apps-header h3 { font-size: 1.2rem; font-weight: 600; color: var(--dark); }
        
        .filter-pills { display: flex; gap: 10px; }
        .filter-pill {
            padding: 8px 20px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem;
            font-weight: 500; color: var(--gray); cursor: pointer; background: transparent; transition: 0.3s;
        }
        .filter-pill.active { background: var(--primary-blue); color: #fff; border-color: var(--primary-blue); }

        /* ---------------- Application Card (Dynamic) ---------------- */
        .app-list { display: flex; flex-direction: column; gap: 15px; }
        
        .app-card {
            border: 1px solid var(--border); border-radius: 16px; padding: 20px 25px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .app-card:hover { border-color: var(--primary-blue); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.05); }

        .app-info h4 { font-size: 1.1rem; font-weight: 600; color: var(--dark); margin-bottom: 10px; }
        .meta-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .meta-item { font-size: 0.85rem; color: var(--gray); display: flex; align-items: center; gap: 6px; }
        
        /* Status Pills */
        .status-pill { padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-left: 10px; }
        .status-active { background: #EEF2FF; color: var(--primary-blue); }
        .status-backup { background: #FFFBEB; color: var(--primary-orange); }
        .status-confirmed { background: #ECFDF5; color: var(--primary-green); }
        .status-rejected { background: #FEF2F2; color: var(--primary-red); }

        .btn-details {
            background: #EEF2FF; color: var(--primary-blue); border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-details:hover { background: var(--primary-blue); color: #fff; }

        .empty-state { text-align: center; padding: 50px 0; color: var(--gray); font-size: 1rem; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">
            <i class="fa-solid fa-graduation-cap"></i> Nextgen
        </a>
        <div class="logout-wrap">
            <div class="logout-btn" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</div>
        </div>
    </div>

    <div class="main-content">
        
        <div class="top-bar">
            <h2>My Applications</h2>
            <div class="user-profile">
                <span id="userName">Loading...</span>
                <div class="avatar" id="userAvatar">NU</div>
            </div>
        </div>

        <div class="page-header">
            <h1>My Applications</h1>
            <p>Track your tuition applications and confirmation progress</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 class="c-active" id="countActive">0</h3>
                <p>Active</p>
            </div>
            <div class="stat-card">
                <h3 class="c-backup" id="countBackup">0</h3>
                <p>Backup</p>
            </div>
            <div class="stat-card">
                <h3 class="c-confirmed" id="countConfirmed">0</h3>
                <p>Confirmed</p>
            </div>
            <div class="stat-card">
                <h3 class="c-rejected" id="countRejected">0</h3>
                <p>Rejected</p>
            </div>
            <div class="stat-card">
                <h3 class="c-all" id="countAll">0</h3>
                <p>All Application</p>
            </div>
        </div>

        <div class="apps-container">
            <div class="apps-header">
                <h3 id="listTitle">All Applications</h3>
                <div class="filter-pills">
                    <button class="filter-pill active" data-filter="all">All</button>
                    <button class="filter-pill" data-filter="active">Active</button>
                    <button class="filter-pill" data-filter="backup">Backup</button>
                    <button class="filter-pill" data-filter="confirmed">Confirmed</button>
                    <button class="filter-pill" data-filter="rejected">Rejected</button>
                </div>
            </div>

            <div class="app-list" id="applicationsContainer">
                <div class="empty-state">Loading your applications...</div>
            </div>
        </div>
    </div>

    <script>
        // ================= FIREBASE INITIALIZATION =================
        const firebaseConfig = {
            apiKey: "AIzaSyCrrNSdlbP9233viAU9-hywG_ibMbKC89o",
            authDomain: "nextgen-tuition-media.firebaseapp.com",
            projectId: "nextgen-tuition-media",
            storageBucket: "nextgen-tuition-media.firebasestorage.app",
            messagingSenderId: "512673325761",
            appId: "1:512673325761:web:195683718dc0b88860ea40"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let allApplicationsData = []; // সব ডেটা সেভ রাখার জন্য লোকাল অ্যারে

        // ================= FETCH & RENDER DATA =================
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').innerText = user.phoneNumber || user.email || "New User";
                fetchApplications(user.uid);
            } else {
                window.location.href = 'index.html'; 
            }
        });

        function fetchApplications(uid) {
            db.collection("applications").where("uid", "==", uid)
            .onSnapshot((querySnapshot) => {
                
                allApplicationsData = []; // রিসেট
                let active = 0, backup = 0, confirmed = 0, rejected = 0, all = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    data.id = doc.id; // ডক আইডি সেভ করা হলো
                    allApplicationsData.push(data);
                    
                    all++;
                    let statusText = (data.status || "Active").toLowerCase();
                    if (statusText === 'active') active++;
                    else if (statusText === 'backup') backup++;
                    else if (statusText === 'confirmed') confirmed++;
                    else if (statusText === 'rejected') rejected++;
                });

                // কাউন্টার আপডেট
                document.getElementById('countActive').innerText = active;
                document.getElementById('countBackup').innerText = backup;
                document.getElementById('countConfirmed').innerText = confirmed;
                document.getElementById('countRejected').innerText = rejected;
                document.getElementById('countAll').innerText = all;

                // বর্তমানে অ্যাক্টিভ থাকা ফিল্টার অনুযায়ী রেন্ডার
                const currentFilter = document.querySelector('.filter-pill.active').getAttribute('data-filter');
                renderApplications(currentFilter);
            });
        }

        // ================= RENDER FUNCTION (FOR FILTERS) =================
        function renderApplications(filterStatus) {
            const container = document.getElementById('applicationsContainer');
            container.innerHTML = ""; 

            // ফিল্টার লজিক
            const filteredData = allApplicationsData.filter(app => {
                if (filterStatus === 'all') return true;
                return (app.status || "Active").toLowerCase() === filterStatus;
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="empty-state">No applications found in this category.</div>`;
                return;
            }

            filteredData.forEach((data) => {
                let statusText = data.status || "Active";
                let sLow = statusText.toLowerCase();
                let statusClass = "status-active";
                
                if (sLow === 'backup') statusClass = "status-backup";
                else if (sLow === 'confirmed') statusClass = "status-confirmed";
                else if (sLow === 'rejected') statusClass = "status-rejected";

                const cardHtml = `
                    <div class="app-card">
                        <div class="app-info">
                            <h4>${data.jobTitle || 'Tutor Request'}</h4>
                            <div class="meta-row">
                                <span class="meta-item">${data.subject || 'N/A'}</span>
                                <span class="meta-item">${data.location || 'Online/Offline'}</span>
                                <span class="meta-item"><i class="fa-solid fa-money-bill-1-wave"></i> ৳${data.salary || 'Negotiable'}/mo</span>
                                <span class="meta-item"><i class="fa-regular fa-calendar"></i> ${data.appliedDate || 'Recent'}</span>
                                <span class="status-pill ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                        <button class="btn-details" onclick="viewDetails('${data.id}')">
                            <i class="fa-regular fa-eye"></i> Details
                        </button>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // ================= FILTER CLICK EVENTS =================
        const filterButtons = document.querySelectorAll('.filter-pill');
        filterButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                filterButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                this.classList.add('active');
                
                // Get filter value and update title
                const filterValue = this.getAttribute('data-filter');
                document.getElementById('listTitle').innerText = this.innerText + " Applications";
                
                // Render matched data
                renderApplications(filterValue);
            });
        });

        // ================= LOGOUT LOGIC =================
        document.getElementById('logoutBtn').addEventListener('click', () => {
            // ফায়ারবেস থেকে লগআউট এবং লোকাল স্টোরেজ ক্লিয়ার
            if(auth.currentUser) {
                auth.signOut().then(() => {
                    localStorage.clear();
                    window.location.href = 'index.html'; // হোমপেজে রিডাইরেক্ট
                }).catch(err => {
                    window.location.href = 'index.html'; // কোনো এরর হলেও রিডাইরেক্ট হবে
                });
            } else {
                window.location.href = 'index.html';
            }
        });

        function viewDetails(applicationId) {
            alert("Viewing details for Application ID: " + applicationId);
        }
    </script>
</body>
</html>

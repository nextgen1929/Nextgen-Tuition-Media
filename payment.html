<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway | Nextgen Tuition</title>
    <link rel="icon" type="image/jpeg" href="cap.jpg.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ---------------- Reset & Variables ---------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { 
            --primary-blue: #6366F1;
            --primary-green: #059669; 
            --dark: #0F172A; 
            --gray: #64748B; 
            --light-gray: #F8FAFC; 
            --border: #E2E8F0;
            --bg-main: #F4F7FE; 
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }
        body { background: var(--bg-main); color: #334155; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        /* ---------------- Payment Card ---------------- */
        .payment-container {
            max-width: 550px; width: 100%; background: #ffffff; border-radius: 24px; padding: 35px 40px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05); border: 1px solid #fff;
        }
        
        .gateway-header { text-align: center; margin-bottom: 30px; }
        .gateway-header i { font-size: 2.5rem; color: var(--primary-blue); margin-bottom: 10px; }
        .gateway-header h2 { font-size: 1.6rem; font-weight: 700; color: var(--dark); }
        .gateway-header p { color: var(--gray); font-size: 0.9rem; margin-top: 5px; }

        /* ---------------- Method Selection ---------------- */
        .method-title { font-size: 1rem; font-weight: 600; color: var(--dark); margin-bottom: 15px; }
        .payment-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        
        .method-radio { display: none; }
        .method-label {
            border: 2px solid var(--border); border-radius: 14px; padding: 15px; text-align: center;
            cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; background: #fff;
        }
        .method-label img { width: 45px; height: 45px; object-fit: contain; border-radius: 8px; }
        .method-label:hover { border-color: var(--primary-blue); background: #F0F2FF; }
        
        .method-radio:checked + .method-label {
            border-color: var(--primary-blue); background: #EEF2FF; color: var(--primary-blue);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.15);
        }

        /* ---------------- Fallback Icons & Colors ---------------- */
        .fallback-icon { display: none; font-size: 2rem; margin-bottom: 5px; }
        .bkash-color { color: #E2136E; }
        .nagad-color { color: #ED1C24; }
        .rocket-color { color: #8C1515; }

        /* ---------------- Instruction Box ---------------- */
        .instruction-box {
            background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 14px; padding: 15px 20px;
            margin-bottom: 25px; font-size: 0.85rem; color: #B45309; display: none;
        }
        .instruction-box.active { display: block; animation: fadeIn 0.3s ease; }

        /* ---------------- Form Inputs ---------------- */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 0.9rem; font-weight: 600; color: #1E293B; }
        .input-group label span { color: #EF4444; }
        
        .form-input {
            width: 100%; padding: 14px 20px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 0.95rem; outline: none; background: #fff; transition: all 0.3s ease; color: var(--dark); font-weight: 500;
        }
        .form-input:focus { 
            border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
        }

        /* ---------------- Submit Button ---------------- */
        .btn-submit-payment {
            width: 100%; padding: 16px; background: var(--primary-green); 
            color: #fff; border: none; border-radius: 12px; font-weight: 600; font-size: 1.05rem; margin-top: 10px;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-submit-payment:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(5, 150, 105, 0.3); background: #047857;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="payment-container">
        <div class="gateway-header">
            <i class="fa-solid fa-shield-halved"></i>
            <h2>Secure Payment Gateway</h2>
            <p>আপনার পেমেন্ট ভেরিফাই করতে নিচের তথ্যগুলো পূরণ করুন</p>
        </div>

        <p class="method-title">Select Payment Method <span>*</span></p>
        
        <div class="payment-methods">
            <label>
                <input type="radio" name="paymentMethod" value="bkash" class="method-radio" onchange="updateInstructions(this.value)" checked>
                <div class="method-label">
                    <img src="bkash.png" alt="bKash" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <i class="fa-solid fa-wallet fallback-icon bkash-color"></i>
                    <span>bKash</span>
                </div>
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="nagad" class="method-radio" onchange="updateInstructions(this.value)">
                <div class="method-label">
                    <img src="nagad.png" alt="Nagad" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <i class="fa-solid fa-wallet fallback-icon nagad-color"></i>
                    <span>Nagad</span>
                </div>
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="rocket" class="method-radio" onchange="updateInstructions(this.value)">
                <div class="method-label">
                    <img src="rocket.png" alt="Rocket" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <i class="fa-solid fa-wallet fallback-icon rocket-color"></i>
                    <span>Rocket</span>
                </div>
            </label>
        </div>

        <div class="instruction-box active" id="instructionBox">
            <strong>bKash Send Money Instruction:</strong><br>
            আমাদের পার্সোনাল নাম্বার <b>01308921664</b> এ টাকা Send Money করার পর নিচের ফর্মটি পূরণ করুন।
        </div>

        <form id="paymentForm" onsubmit="handlePaymentSubmit(event)">
            
            <div class="input-group">
                <label>Amount (BDT) <span>*</span></label>
                <input type="number" id="payableAmount" class="form-input" placeholder="e.g. 500" required>
            </div>

            <div class="input-group">
                <label>Sender Mobile Number <span>*</span></label>
                <input type="text" id="senderNumber" class="form-input" placeholder="01XXXXXXXXX" required pattern="01[3-9][0-9]{8}">
            </div>

            <div class="input-group">
                <label>Transaction ID (TxnID) <span>*</span></label>
                <input type="text" id="transactionId" class="form-input" placeholder="e.g. AM87HD92KS" required style="text-transform: uppercase;">
            </div>

            <button type="submit" class="btn-submit-payment">
                <i class="fa-solid fa-lock"></i> Submit Payment
            </button>
        </form>
    </div>

    <script>
        // ================= FIREBASE INITIALIZATION =================
        const firebaseConfig = {
            apiKey: "AIzaSyCrrNSdlbP9233viAU9-hywG_ibMbKC89o",
            authDomain: "nextgen-tuition-media.firebaseapp.com",
            projectId: "nextgen-tuition-media",
            storageBucket: "nextgen-tuition-media.firebasestorage.app",
            messagingSenderId: "512673325761",
            appId: "1:512673325761:web:195683718dc0b88860ea40"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ================= UPDATE METHOD INSTRUCTIONS (Added specific number) =================
        function updateInstructions(method) {
            const insBox = document.getElementById('instructionBox');
            const targetNumber = "01308921664"; 

            if (method === 'bkash') {
                insBox.innerHTML = `<strong>bKash Send Money Instruction:</strong><br>আমাদের পার্সোনাল নাম্বার <b>${targetNumber}</b> এ টাকা Send Money করার পর নিচের ফর্মটি পূরণ করুন।`;
            } else if (method === 'nagad') {
                insBox.innerHTML = `<strong>Nagad Send Money Instruction:</strong><br>আমাদের পার্সোনাল নাম্বার <b>${targetNumber}</b> এ টাকা Send Money করার পর নিচের ফর্মটি পূরণ করুন।`;
            } else if (method === 'rocket') {
                insBox.innerHTML = `<strong>Rocket Send Money Instruction:</strong><br>আমাদের পার্সোনাল নাম্বার <b>${targetNumber}</b> এ টাকা Send Money করার পর নিচের ফর্মটি পূরণ করুন।`;
            }
        }

        // ================= SUBMIT PAYMENT DATA TO FIREBASE =================
        function handlePaymentSubmit(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if(!user) {
                alert('Please login to complete payment registration.');
                return;
            }

            const selectedMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            const amount = document.getElementById('payableAmount').value;
            const senderNumber = document.getElementById('senderNumber').value;
            const txnId = document.getElementById('transactionId').value.toUpperCase();

            const paymentData = {
                uid: user.uid,
                method: selectedMethod,
                amountPaid: amount,
                senderMobile: senderNumber,
                transactionId: txnId,
                status: "Pending", 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection('payments').add(paymentData)
            .then(() => {
                alert('Payment submission successful! Please wait for admin approval.');
                document.getElementById('paymentForm').reset();
                window.location.href = 'dashboard.html'; 
            })
            .catch((error) => {
                alert('Error submitting payment: ' + error.message);
            });
        }
    </script>
</body>
</html>
